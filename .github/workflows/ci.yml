name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install
        run: npm ci
      - name: Generate Prisma client
        run: npm run prisma:generate
      - name: Validate Prisma schema
        run: npm exec prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/4founders
      - name: Build
        run: npm run build
